# jarvis-core 전역 설정
jarvis:
  name: "자비스"
  language: "ko"

engine:
  timeout: 60  # Claude Code CLI 호출 타임아웃 (초)

groq:
  model: llama-3.3-70b-versatile
  max_tokens: 1024
  temperature: 0.7
  timeout: 30  # GroqEngine이 실제로 읽는 값 (core/engines/groq_engine.py)

router:
  threshold: 0.4  # 스킬 선택 최소 신뢰도. 미달 시 AI 폴백

voice:
  stt_model: "base"
  tts_voice: "ko-KR-SunHiNeural"
  wakeword: "자비스"
  stt_fail_limit: 3  # 연속 실패 횟수 초과 시 채팅 모드 자동 전환

ui:
  host: "127.0.0.1"
  port: 8765
